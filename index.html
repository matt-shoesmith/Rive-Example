<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salishan</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
      #rive-canvas { width: 100vw; height: 100vh; display: block; }
      #loading { position: absolute; color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; }
    </style>
  </head>
  <body>
    <canvas id="rive-canvas"></canvas>
    <div id="loading">Loading</div>
    <script src="https://unpkg.com/@rive-app/webgl2"></script>
    <script>
      const r = new rive.Rive({
        src: "salishan.riv",
        canvas: document.getElementById("rive-canvas"),
        autoplay: true,
        autoBind: true,
        stateMachines: "MAIN",
        layout: new rive.Layout({ 
          fit: rive.Fit.Layout,
          layoutScaleFactor: 1,
        }),
        onLoad: () => {
          r.resizeDrawingSurfaceToCanvas();
          document.getElementById("loading").style.display = "none";
        },
      });
      window.addEventListener("resize", () => {
        r.resizeDrawingSurfaceToCanvas();
      });
    </script>
  </body>
</html>
